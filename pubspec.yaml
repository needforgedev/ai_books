name: ai_books
description: "Speedread — a Blinkist-style learning app for Gen Z. Fully offline."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/seed/
    - assets/images/covers/
    - assets/images/illustrations/
    - assets/mindmaps/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/SpeedRead_Icon_splash.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/SpeedRead_Icon_splash.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0A0C"
  image: "assets/branding/SpeedRead_Icon_splash.png"
  android_12:
    color: "#0A0A0C"
    image: "assets/branding/SpeedRead_Icon_splash.png"
  android: true
  ios: true
  fullscreen: true
